name: Deploy Majlis

on:
  push:
    branches: [main]
  workflow_dispatch:      # manual trigger from GitHub UI

concurrency:
  group: deploy-production
  cancel-in-progress: false   # never cancel a running deploy

jobs:
  # ── 1. Build & test frontend ────────────────────────────────────────────────
  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # ── 2. Deploy frontend → Cloudflare Pages ───────────────────────────────────
  deploy-frontend:
    name: Deploy → Cloudflare Pages
    needs: frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name majlis --commit-dirty=true

  # ── 3. Build & push backend Docker image ────────────────────────────────────
  backend-image:
    name: Build Backend Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/majlis-backend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 4. Deploy backend → AMD Droplet ─────────────────────────────────────────
  deploy-backend:
    name: Deploy → AMD Droplet
    needs: backend-image
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose files to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "docker-compose.yml,nginx.conf,nginx-snippets/"
          target: /opt/majlis/repo

      - name: Deploy on droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -e
            cd /opt/majlis/repo

            # Pull latest backend image from GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            IMAGE="ghcr.io/${{ github.repository_owner }}/majlis-backend:sha-${{ github.sha }}"
            docker pull "$IMAGE"

            # Update docker-compose to use exact image tag
            sed -i "s|build:.*|image: $IMAGE|" docker-compose.yml

            # Rolling restart — only restart backend + nginx (keep models running)
            docker compose stop backend nginx
            docker compose up -d backend nginx

            # Health check
            sleep 10
            STATUS=$(curl -sf http://localhost:8000/health | python3 -c \
              "import sys,json; print(json.load(sys.stdin).get('status','?'))")
            echo "Backend health: $STATUS"
            [[ "$STATUS" == "ok" ]] || exit 1

            echo "Deploy successful!"

  # ── 5. Notify ───────────────────────────────────────────────────────────────
  notify:
    name: Notify
    needs: [deploy-frontend, deploy-backend]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Report status
        run: |
          if [[ "${{ needs.deploy-frontend.result }}" == "success" && \
                "${{ needs.deploy-backend.result }}" == "success" ]]; then
            echo "✅ Majlis deployed successfully!"
            echo "  Frontend: https://majlis.pages.dev"
            echo "  Backend: https://${{ secrets.DROPLET_IP }}/health"
          else
            echo "❌ Deploy failed"
            echo "  Frontend: ${{ needs.deploy-frontend.result }}"
            echo "  Backend:  ${{ needs.deploy-backend.result }}"
            exit 1
          fi
