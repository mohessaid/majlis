worker_processes auto;

events {
    worker_connections 2048;
}

http {
    server_tokens off;

    # Docker embedded DNS — required for variable-based proxy_pass to defer resolution
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Gzip
    gzip on;
    gzip_types application/json text/plain text/event-stream;

    # ── HTTP ─────────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # SSE requires zero buffering and long timeouts
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        location / {
            set $upstream "http://backend:8000";
            proxy_pass $upstream;
            include /etc/nginx/snippets/proxy_params.conf;
        }
    }

    # HTTPS terminated at Cloudflare edge — no SSL needed at origin
}
