worker_processes auto;

events {
    worker_connections 2048;
}

http {
    # Disable server tokens in responses
    server_tokens off;

    # Upstream — FastAPI backend
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Gzip
    gzip on;
    gzip_types application/json text/plain text/event-stream;

    # ── HTTP: redirect to HTTPS ──────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Let's Encrypt ACME challenge (used by 03-ssl.sh)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            # If SSL certs exist → redirect; otherwise serve directly (pre-SSL)
            if (-f /etc/nginx/ssl/cert.pem) {
                return 301 https://$host$request_uri;
            }
            proxy_pass http://backend;
            include /etc/nginx/snippets/proxy_params.conf;
        }
    }

    # ── HTTPS ────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # HSTS
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # SSE requires zero buffering and long timeouts
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     300s;
        proxy_send_timeout     300s;
        keepalive_timeout      300s;

        location / {
            proxy_pass http://backend;
            include /etc/nginx/snippets/proxy_params.conf;
        }
    }
}
